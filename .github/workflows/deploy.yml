name: Deploy site to GitHub Pages

# Publishes the interactive guide as the main site, with the Astro writeup
# preserved under /writeup:
#   - interactive guide (demo/web/)      -> https://virkvarjun.github.io/KhemKernel/
#   - Astro writeup site (picochem-site/) -> https://virkvarjun.github.io/KhemKernel/writeup/
# The guide's live-inference panel needs the Python backend, so on Pages it
# falls back to the precomputed examples; everything else is fully static.

on:
  push:
    branches: [main]
    paths:
      - 'picochem-site/**'
      - 'demo/web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Interactive guide -> demo/web/dist (served at the root /KhemKernel/)
      - name: Build interactive guide
        working-directory: demo/web
        run: |
          npm ci
          npm run build -- --base=/KhemKernel/

      # Astro writeup site -> picochem-site/dist (served at /KhemKernel/writeup/)
      - name: Build Astro site
        working-directory: picochem-site
        run: |
          npm ci
          npm run build

      # Assemble: guide at the root, writeup under /writeup
      - name: Combine builds
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R demo/web/dist/. _site/
          mkdir -p _site/writeup
          cp -R picochem-site/dist/. _site/writeup/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
